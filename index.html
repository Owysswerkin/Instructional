<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --font-serif: 'Fraunces', serif; --font-sans: 'Inter', sans-serif; }
        body { font-family: var(--font-sans); background-color: #ffffff; scroll-behavior: smooth; }
        h1, h2, h3, .serif-heading { font-family: var(--font-serif); font-variation-settings: 'SOFT' 50, 'WONK' 1; }
        
        .markdown-body { font-size: 1.05rem; line-height: 1.8; color: #334155; }
        .markdown-body h1 { font-size: 2.25rem; font-weight: 800; margin-bottom: 1.5rem; color: #0f172a; scroll-margin-top: 5rem; }
        .markdown-body h2 { font-size: 1.75rem; font-weight: 700; margin-top: 2.5rem; margin-bottom: 1rem; color: #1e293b; scroll-margin-top: 5rem; }
        .markdown-body p { margin-bottom: 1.5rem; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1.5rem; }
        
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 16px; background: #000; margin: 2rem 0; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        html { scroll-behavior: smooth; }
        .toc-link.active { color: #10b981; font-weight: 600; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-900 overflow-x-hidden">
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        nameAttr: 'data-lucide',
                        attrs: { class: className, 'stroke-width': 2, width: size, height: size },
                        root: iconRef.current
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const App = () => {
            const [view, setView] = useState('landing'); 
            const [isAdmin, setIsAdmin] = useState(false);
            const [activeCourseIdx, setActiveCourseIdx] = useState(0);
            const [activeModuleIdx, setActiveModuleIdx] = useState(0);
            const [activeLessonIdx, setActiveLessonIdx] = useState(0);
            const [showMobileSidebar, setShowMobileSidebar] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            
            const [courses, setCourses] = useState([
                {
                    id: 1,
                    title: "Fundamentals of Design",
                    description: "Master minimalist aesthetics with practical exercises.",
                    modules: [
                        { 
                            id: 101, 
                            title: "Getting Started", 
                            lessons: [
                                { id: 1001, title: "Welcome", content: "# Welcome\nWatch this intro to get a feel for the curriculum.\n\nhttps://www.youtube.com/watch?v=dQw4w9WgXcQ\n\n## Core Principles\nDesign is about constraints. Keep it simple and focused." },
                                { id: 1002, title: "Learning Path", content: "# Learning Path\nFollow the sidebar to navigate through the modules." }
                            ]
                        },
                        { 
                            id: 102, 
                            title: "Typography", 
                            lessons: [
                                { id: 1003, title: "Type Basics", content: "# Type Basics\nUse clean sans-serif fonts for UI to ensure readability." }
                            ]
                        }
                    ]
                }
            ]);

            const currentCourse = courses[activeCourseIdx] || courses[0];
            const currentModule = currentCourse.modules[activeModuleIdx] || currentCourse.modules[0];
            const currentLesson = currentModule.lessons[activeLessonIdx] || currentModule.lessons[0];

            const tocItems = useMemo(() => {
                if (!currentLesson?.content) return [];
                return currentLesson.content.split('\n')
                    .filter(line => line.trim().startsWith('#'))
                    .map(line => {
                        const match = line.match(/^(#+)/);
                        if (!match) return null;
                        const level = match[0].length;
                        if (level > 2) return null;
                        const text = line.replace(/^#+\s*/, '').trim();
                        const id = text.toLowerCase().replace(/[^\w]+/g, '-');
                        return { text, level, id };
                    }).filter(Boolean);
            }, [activeCourseIdx, activeModuleIdx, activeLessonIdx, courses]);

            const renderMarkdown = (text) => {
                if (!text) return '';
                const ytRegex = /^(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})(?:\S+)?$/gm;
                const filteredText = text.replace(ytRegex, (match, id) => `<div class="video-wrapper"><iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe></div>`);
                const renderer = new marked.Renderer();
                renderer.heading = (text, level) => {
                    const cleanText = String(typeof text === 'object' ? text.text : text || '');
                    const id = cleanText.toLowerCase().replace(/[^\w]+/g, '-');
                    return `<h${level} id="${id}" class="serif-heading">${cleanText}</h${level}>`;
                };
                return marked.parse(filteredText, { renderer });
            };

            const addCourse = () => {
                const newCourse = {
                    id: Date.now(),
                    title: "New Course Name",
                    description: "Describe what students will learn...",
                    modules: [{ id: Date.now() + 1, title: "Introduction", lessons: [{ id: Date.now() + 2, title: "Hello World", content: "# Welcome" }] }]
                };
                setCourses([...courses, newCourse]);
                setActiveCourseIdx(courses.length);
                setView('editor');
            };

            const addModule = (courseIdx) => {
                const newCourses = [...courses];
                newCourses[courseIdx].modules.push({
                    id: Date.now(),
                    title: "Untitled Module",
                    lessons: [{ id: Date.now() + 1, title: "Untitled Lesson", content: "# Content" }]
                });
                setCourses(newCourses);
            };

            const addLesson = (courseIdx, moduleIdx) => {
                const newCourses = [...courses];
                newCourses[courseIdx].modules[moduleIdx].lessons.push({
                    id: Date.now(),
                    title: "Untitled Lesson",
                    content: "# Content"
                });
                setCourses(newCourses);
            };

            const updateField = (path, value) => {
                setIsSaving(true);
                const newCourses = [...courses];
                let current = newCourses[activeCourseIdx];
                if (path.length === 1) current[path[0]] = value;
                else if (path.length === 3) current.modules[path[1]][path[2]] = value;
                else if (path.length === 5) current.modules[path[1]].lessons[path[3]][path[4]] = value;
                setCourses(newCourses);
                setTimeout(() => setIsSaving(false), 500);
            };

            if (view === 'viewer') {
                return (
                    <div className="flex h-screen bg-white overflow-hidden relative">
                        <aside className={`fixed inset-0 z-50 transform ${showMobileSidebar ? 'translate-x-0' : '-translate-x-full'} md:relative md:translate-x-0 md:w-80 transition-transform duration-300 bg-slate-50 border-r border-slate-100 flex flex-col`}>
                            <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-white">
                                <button onClick={() => setView('landing')} className="flex items-center gap-2 text-slate-400 hover:text-slate-900 text-[10px] font-bold uppercase tracking-tighter">
                                    <Icon name="arrow-left" size={12} /> Dashboard
                                </button>
                                <button className="md:hidden" onClick={() => setShowMobileSidebar(false)}><Icon name="x" size={16}/></button>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-6">
                                {currentCourse.modules.map((m, mIdx) => (
                                    <div key={m.id} className="space-y-1">
                                        <h5 className="px-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">{m.title}</h5>
                                        {m.lessons.map((l, lIdx) => (
                                            <button key={l.id} onClick={() => { setActiveModuleIdx(mIdx); setActiveLessonIdx(lIdx); setShowMobileSidebar(false); }}
                                                className={`w-full text-left px-4 py-2 rounded-lg text-xs transition-all ${mIdx === activeModuleIdx && lIdx === activeLessonIdx ? 'bg-slate-900 text-white font-semibold' : 'text-slate-500 hover:bg-slate-200/50'}`}>
                                                {l.title}
                                            </button>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        </aside>

                        <div className="flex-1 flex flex-col h-full bg-white relative overflow-hidden">
                             <header className="md:hidden flex items-center justify-between p-4 border-b border-slate-100 bg-white">
                                <button onClick={() => setShowMobileSidebar(true)} className="p-2"><Icon name="menu" /></button>
                                <div className="text-[10px] font-bold uppercase tracking-widest text-slate-400">{currentLesson?.title}</div>
                                <div className="w-8"></div>
                            </header>
                            <div className="flex-1 flex overflow-hidden">
                                <main className="flex-1 overflow-y-auto px-6 md:px-12 lg:px-20 py-16 scroll-smooth">
                                    <article className="max-w-2xl mx-auto pb-32">
                                        <div className="markdown-body" dangerouslySetInnerHTML={{ __html: renderMarkdown(currentLesson?.content) }} />
                                    </article>
                                </main>
                                
                                {/* RESTORED TOC PANEL */}
                                <aside className="hidden xl:block w-72 border-l border-slate-50 p-8 overflow-y-auto bg-white/50">
                                    <div className="sticky top-0">
                                        <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-6">On this page</h4>
                                        <ul className="space-y-4">
                                            {tocItems.map((item, i) => (
                                                <li key={i} style={{ paddingLeft: `${(item.level - 1) * 12}px` }}>
                                                    <a href={`#${item.id}`} className="toc-link text-xs font-medium text-slate-500 hover:text-emerald-600 transition-colors block leading-relaxed">
                                                        {item.text}
                                                    </a>
                                                </li>
                                            ))}
                                            {tocItems.length === 0 && (
                                                <li className="text-[10px] text-slate-300 italic">No headers found</li>
                                            )}
                                        </ul>
                                    </div>
                                </aside>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'editor') {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col">
                        <header className="sticky top-0 z-50 bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center">
                            <div className="flex items-center gap-4 flex-1">
                                <button onClick={() => setView('landing')} className="text-slate-400 hover:text-slate-900 p-2"><Icon name="arrow-left" /></button>
                                <input value={currentCourse.title} onChange={e => updateField(['title'], e.target.value)}
                                    className="bg-transparent font-bold text-xl outline-none w-full max-w-md focus:text-emerald-600" />
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="text-[10px] font-bold uppercase text-slate-400">{isSaving ? 'Saving...' : 'Draft'}</div>
                                <button onClick={() => addModule(activeCourseIdx)} className="bg-slate-900 text-white px-4 py-2 rounded-full text-xs font-bold hover:bg-slate-800 flex items-center gap-2">
                                    <Icon name="folder-plus" size={14}/> Add Module
                                </button>
                            </div>
                        </header>
                        
                        <div className="max-w-6xl mx-auto w-full p-6 space-y-12 pb-32">
                            {currentCourse.modules.map((module, mIdx) => (
                                <section key={module.id} className="space-y-4">
                                    <div className="flex items-center gap-4 bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                                        <div className="w-8 h-8 bg-slate-100 rounded-lg flex items-center justify-center text-[10px] font-bold text-slate-400">M{mIdx+1}</div>
                                        <input value={module.title} onChange={e => updateField(['modules', mIdx, 'title'], e.target.value)}
                                            className="font-bold text-slate-800 outline-none flex-1 bg-transparent" placeholder="Module Title" />
                                        <button onClick={() => addLesson(activeCourseIdx, mIdx)} className="text-[10px] font-bold text-emerald-600 hover:bg-emerald-50 px-3 py-1.5 rounded-lg transition-colors">
                                            + Add Lesson
                                        </button>
                                    </div>
                                    <div className="grid grid-cols-1 gap-6 ml-6 border-l-2 border-slate-200 pl-6">
                                        {module.lessons.map((lesson, lIdx) => (
                                            <div key={lesson.id} className="bg-white border border-slate-200 rounded-3xl overflow-hidden flex flex-col lg:flex-row shadow-sm">
                                                <div className="flex-1 flex flex-col">
                                                    <input value={lesson.title} onChange={e => updateField(['modules', mIdx, 'lessons', lIdx, 'title'], e.target.value)}
                                                        className="p-4 border-b border-slate-100 outline-none font-bold text-sm text-slate-600" placeholder="Lesson Title" />
                                                    <textarea value={lesson.content} onChange={e => updateField(['modules', mIdx, 'lessons', lIdx, 'content'], e.target.value)}
                                                        className="flex-1 p-6 h-[300px] outline-none font-mono text-[11px] leading-relaxed resize-none" placeholder="Lesson content (Markdown)..." />
                                                </div>
                                                <div className="flex-1 p-6 bg-slate-50/30 overflow-y-auto max-h-[350px] lg:max-h-full">
                                                    <div className="markdown-body opacity-50 pointer-events-none scale-90 origin-top-left" dangerouslySetInnerHTML={{ __html: renderMarkdown(lesson.content) }} />
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50">
                    <nav className="p-6 border-b border-slate-100 bg-white flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-slate-900 rounded-xl flex items-center justify-center text-white"><Icon name="graduation-cap" size={16}/></div>
                            <h2 className="serif-heading font-bold text-xl tracking-tight">Academix</h2>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setIsAdmin(!isAdmin)} className={`px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest border transition-all ${isAdmin ? 'bg-emerald-50 text-emerald-600 border-emerald-200 shadow-sm' : 'text-slate-400 border-slate-200'}`}>
                                {isAdmin ? 'Admin Mode On' : 'Student Mode'}
                            </button>
                            {isAdmin && (
                                <button onClick={addCourse} className="bg-slate-900 text-white px-5 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest hover:shadow-lg transition-all">
                                    New Course
                                </button>
                            )}
                        </div>
                    </nav>

                    <div className="max-w-6xl mx-auto px-6 py-20">
                        <header className="mb-16">
                            <h1 className="text-5xl font-extrabold serif-heading mb-4">Your Learning Paths</h1>
                            <p className="text-slate-400">Select a course to continue or explore new topics.</p>
                        </header>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {courses.map((c, idx) => (
                                <div key={c.id} className="group relative bg-white border border-slate-200 p-8 rounded-[2.5rem] shadow-sm hover:shadow-2xl hover:-translate-y-1 transition-all duration-300">
                                    <div className="mb-8 flex justify-between items-start">
                                        <div className="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400 group-hover:bg-slate-900 group-hover:text-white transition-all">
                                            <Icon name="book" size={20}/>
                                        </div>
                                        {isAdmin && (
                                            <button onClick={() => { setActiveCourseIdx(idx); setView('editor'); }} className="p-2 text-slate-300 hover:text-slate-900">
                                                <Icon name="settings" size={16}/>
                                            </button>
                                        )}
                                    </div>
                                    <h3 className="text-2xl font-bold mb-3 serif-heading">{c.title}</h3>
                                    <p className="text-slate-500 text-sm leading-relaxed mb-8 line-clamp-2">{c.description}</p>
                                    
                                    <div className="flex items-center justify-between pt-6 border-t border-slate-50">
                                        <span className="text-[10px] font-bold text-slate-300 uppercase tracking-widest">
                                            {c.modules.reduce((acc, m) => acc + m.lessons.length, 0)} Lessons
                                        </span>
                                        <button onClick={() => { setActiveCourseIdx(idx); setView('viewer'); }}
                                            className="px-6 py-2 bg-slate-900 text-white rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-emerald-600 transition-colors">
                                            Go to Course
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
