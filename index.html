<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --font-serif: 'Fraunces', serif; --font-sans: 'Inter', sans-serif; }
        body { font-family: var(--font-sans); background-color: #ffffff; scroll-behavior: smooth; }
        h1, h2, h3, .serif-heading { font-family: var(--font-serif); font-variation-settings: 'SOFT' 50, 'WONK' 1; }
        
        .markdown-body { font-size: 1.05rem; line-height: 1.8; color: #334155; }
        .markdown-body h1 { font-size: 2.25rem; font-weight: 800; margin-bottom: 1.5rem; color: #0f172a; scroll-margin-top: 5rem; }
        .markdown-body h2 { font-size: 1.75rem; font-weight: 700; margin-top: 2.5rem; margin-bottom: 1rem; color: #1e293b; scroll-margin-top: 5rem; }
        .markdown-body p { margin-bottom: 1.5rem; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1.5rem; }
        
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 16px; background: #000; margin: 2rem 0; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        .dot { transition: all 0.3s ease-in-out; }
        input:checked ~ .dot { transform: translateX(100%); background-color: #10b981; }

        /* Smooth scroll for TOC links */
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="text-slate-900 overflow-x-hidden">
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        nameAttr: 'data-lucide',
                        attrs: { class: className, 'stroke-width': 2, width: size, height: size },
                        root: iconRef.current
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const App = () => {
            const [view, setView] = useState('landing'); 
            const [isAdmin, setIsAdmin] = useState(false);
            const [activeLessonIdx, setActiveLessonIdx] = useState(0);
            const [showMobileSidebar, setShowMobileSidebar] = useState(false);
            const [course, setCourse] = useState({
                title: "Fundamentals of Design",
                description: "Master minimalist aesthetics with practical exercises.",
                lessons: [
                    { id: 1, title: "Getting Started", content: "# Welcome\nWatch this intro to get a feel for the curriculum.\n\nhttps://www.youtube.com/watch?v=dQw4w9WgXcQ\n\n## Core Principles\nDesign is about constraints. Keep it simple and focused.\n\n## Learning Path\nFollow the sidebar to navigate through the modules." },
                    { id: 2, title: "Typography", content: "# Type Basics\nUse clean sans-serif fonts for UI to ensure readability.\n\n## Recommended Fonts\n- Inter\n- Roboto\n- Helvetica\n\n## Why Typography Matters\nIt is the foundation of digital clarity." }
                ]
            });
            const [isSaving, setIsSaving] = useState(false);

            // AUTO-GENERATING TOC FROM HEADERS
            const TOC = useMemo(() => {
                const currentLesson = course.lessons[activeLessonIdx];
                if (!currentLesson?.content) return [];
                const lines = currentLesson.content.split('\n');
                return lines
                    .filter(line => line.trim().startsWith('#'))
                    .map(line => {
                        const match = line.match(/^(#+)/);
                        if (!match) return null;
                        const level = match[0].length;
                        const text = line.replace(/^#+\s*/, '').trim();
                        const id = text.toLowerCase().replace(/[^\w]+/g, '-');
                        return { text, level, id };
                    })
                    .filter(Boolean);
            }, [activeLessonIdx, course.lessons]);

            const renderMarkdown = (text) => {
                if (!text) return '';
                const ytRegex = /^(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})(?:\S+)?$/gm;
                const filteredText = text.replace(ytRegex, (match, id) => {
                    return `<div class="video-wrapper"><iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe></div>`;
                });
                const renderer = new marked.Renderer();
                renderer.heading = (text, level) => {
                    const cleanText = String(typeof text === 'object' ? text.text : text || '');
                    const id = cleanText.toLowerCase().replace(/[^\w]+/g, '-');
                    return `<h${level} id="${id}" class="serif-heading">${cleanText}</h${level}>`;
                };
                return marked.parse(filteredText, { renderer });
            };

            const updateLesson = (idx, field, value) => {
                setIsSaving(true);
                const newLessons = [...course.lessons];
                newLessons[idx] = { ...newLessons[idx], [field]: value };
                setCourse({ ...course, lessons: newLessons });
                setTimeout(() => setIsSaving(false), 800);
            };

            if (view === 'viewer') {
                const currentLesson = course.lessons[activeLessonIdx];
                return (
                    <div className="flex flex-col md:flex-row h-screen bg-white overflow-hidden">
                        {/* LEFT NAV: LESSON LIST */}
                        <aside className={`fixed inset-0 z-50 transform ${showMobileSidebar ? 'translate-x-0' : '-translate-x-full'} md:relative md:translate-x-0 md:w-72 transition-transform duration-300 bg-slate-50 border-r border-slate-100 flex flex-col`}>
                            <div className="p-6 border-b border-slate-100 flex justify-between items-center">
                                <button onClick={() => setView('landing')} className="flex items-center gap-2 text-slate-400 hover:text-slate-900 text-xs font-bold uppercase tracking-tighter">
                                    <Icon name="arrow-left" size={14} /> Exit
                                </button>
                                <button className="md:hidden" onClick={() => setShowMobileSidebar(false)}><Icon name="x"/></button>
                            </div>
                            <nav className="flex-1 overflow-y-auto p-4 space-y-1">
                                {course.lessons.map((l, i) => (
                                    <button key={l.id} onClick={() => { setActiveLessonIdx(i); setShowMobileSidebar(false); }}
                                        className={`w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 ${i === activeLessonIdx ? 'bg-white shadow-sm border border-slate-200 text-slate-900 font-semibold' : 'text-slate-500'}`}>
                                        <span className="text-xs truncate">{l.title}</span>
                                    </button>
                                ))}
                            </nav>
                        </aside>

                        {/* CENTER: CONTENT */}
                        <main className="flex-1 overflow-y-auto relative bg-white px-6 md:px-16 py-12 scroll-smooth">
                            <header className="md:hidden mb-8 flex items-center gap-4">
                                <button onClick={() => setShowMobileSidebar(true)} className="p-2 bg-slate-100 rounded-lg"><Icon name="menu"/></button>
                                <span className="text-xs font-bold uppercase tracking-widest text-slate-400">Lesson {activeLessonIdx + 1}</span>
                            </header>
                            <article className="max-w-2xl mx-auto">
                                <div className="markdown-body" dangerouslySetInnerHTML={{ __html: renderMarkdown(currentLesson?.content) }} />
                                <div className="mt-16 pt-8 border-t border-slate-100 flex justify-between">
                                    <button disabled={activeLessonIdx === 0} onClick={() => setActiveLessonIdx(v => v - 1)} className="px-6 py-3 text-slate-400 disabled:opacity-0 text-sm font-bold">Previous</button>
                                    <button onClick={() => activeLessonIdx === course.lessons.length - 1 ? setView('landing') : setActiveLessonIdx(v => v + 1)} className="px-8 py-3 bg-slate-900 text-white rounded-xl font-bold text-sm">Next</button>
                                </div>
                            </article>
                        </main>

                        {/* RIGHT NAV: TABLE OF CONTENTS (DESKTOP) */}
                        <aside className="hidden lg:block w-64 border-l border-slate-50 p-8 overflow-y-auto">
                            <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-6">On this page</h4>
                            <ul className="space-y-4">
                                {TOC.map((item, i) => (
                                    <li key={i} style={{ paddingLeft: `${(item.level - 1) * 12}px` }}>
                                        <a href={`#${item.id}`} className="text-xs font-medium text-slate-500 hover:text-emerald-600 transition-colors block leading-relaxed">
                                            {item.text}
                                        </a>
                                    </li>
                                ))}
                            </ul>
                            {TOC.length === 0 && <p className="text-[10px] text-slate-300 italic">No headers found</p>}
                        </aside>
                    </div>
                );
            }

            if (view === 'editor') {
                return (
                    <div className="min-h-screen bg-slate-50">
                        <header className="sticky top-0 z-50 bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center">
                            <button onClick={() => setView('landing')} className="text-slate-400 hover:text-slate-900"><Icon name="arrow-left" /></button>
                            <div className="text-[10px] font-bold uppercase tracking-widest text-slate-400">{isSaving ? 'Saving...' : 'Saved'}</div>
                        </header>
                        <div className="max-w-5xl mx-auto p-6 space-y-8">
                            {course.lessons.map((lesson, idx) => (
                                <div key={lesson.id} className="bg-white border border-slate-200 rounded-3xl overflow-hidden flex flex-col lg:flex-row">
                                    <textarea value={lesson.content} onChange={e => updateLesson(idx, 'content', e.target.value)}
                                        className="flex-1 p-8 h-[400px] outline-none font-mono text-xs border-b lg:border-b-0 lg:border-r border-slate-100" />
                                    <div className="flex-1 p-8 bg-slate-50/20 overflow-y-auto">
                                        <div className="markdown-body opacity-60" dangerouslySetInnerHTML={{ __html: renderMarkdown(lesson.content) }} />
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-4xl mx-auto px-6 py-24 fade-in text-center">
                    <h1 className="text-6xl font-extrabold mb-4 serif-heading">Academy</h1>
                    <p className="text-slate-400 mb-12">Select a path to begin.</p>
                    <div className="inline-block bg-white border border-slate-200 p-12 rounded-[3rem] shadow-sm hover:shadow-2xl transition-all cursor-pointer text-left w-full max-w-xl mx-auto"
                        onClick={() => isAdmin ? setView('editor') : setView('viewer')}>
                        <div className="mb-8 flex items-center justify-between">
                            <div className="w-12 h-12 bg-slate-900 text-white rounded-2xl flex items-center justify-center">
                                <Icon name={isAdmin ? "edit-3" : "play"} />
                            </div>
                            <div className="flex items-center gap-2">
                                <span className="text-[10px] font-bold uppercase text-slate-400">Builder</span>
                                <input type="checkbox" checked={isAdmin} onChange={(e) => { e.stopPropagation(); setIsAdmin(!isAdmin); }} />
                            </div>
                        </div>
                        <h3 className="text-3xl font-bold mb-2 serif-heading">{course.title}</h3>
                        <p className="text-slate-500 text-sm leading-relaxed">{course.description}</p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
