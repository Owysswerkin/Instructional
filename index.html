<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NextLabs Academy</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=DM+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- React + ReactDOM (production) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel standalone to compile JSX in-browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'DM Sans', sans-serif; background: #fff; color: #1E293B; }
    #root { height: 100%; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 99px; }
    .viewer-sidebar { display: flex; flex-direction: column; height: 100%; }
    .mobile-bar { display: none !important; }
    @media (max-width: 768px) {
      .viewer-sidebar { display: none !important; }
      .mobile-bar { display: flex !important; }
      .details-grid { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useCallback, memo, useEffect, useRef } = React;

    // ── Design tokens ──────────────────────────────────────────────────────────
    const T = { navy: '#003A7A', orange: '#F47920', slate: '#64748B' };

    // ── Icon ──────────────────────────────────────────────────────────────────
    const Icon = memo(({ name, size = 16 }) => {
      const ref = useRef(null);
      useEffect(() => {
        const t = setTimeout(() => {
          if (ref.current && window.lucide) window.lucide.createIcons({ nodes: [ref.current] });
        }, 0);
        return () => clearTimeout(t);
      }, [name]);
      return (
        <i ref={ref} data-lucide={name}
           style={{ width: size, height: size, display: 'inline-block', flexShrink: 0, verticalAlign: 'middle' }} />
      );
    });

    // ── Seed courses ──────────────────────────────────────────────────────────
    const SEED = [
      {
        id: 'zt-foundations',
        title: 'Zero Trust Data-Centric Security Foundations',
        tagline: 'Core Principles of Data Protection',
        description: "Master the fundamentals of NextLabs' Zero Trust architecture. Learn how to protect data across applications, databases, and file repositories using dynamic authorization.",
        duration: '45 min', level: 'Level 1',
        thumbnail: 'https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=800',
        sections: [
          {
            title: 'Introduction',
            lessons: [
              { id: 'zt-l1', title: 'The NextLabs Vision',
                content: '# The NextLabs Vision\nProtecting data anytime, anywhere.\n\n![Secure](https://images.unsplash.com/photo-1563986768609-322da13575f3?auto=format&fit=crop&q=80&w=800)\n\nhttps://www.youtube.com/watch?v=dQw4w9WgXcQ' },
              { id: 'zt-l2', title: 'Dynamic Authorization Strategy',
                content: '## Technology Overview\nOur patented dynamic authorization technology is the industry leader.\n\nIt enables real-time policy enforcement across every data surface.' },
            ],
          },
          {
            title: 'Core Concepts',
            lessons: [
              { id: 'zt-l3', title: 'Policy Decision Points',
                content: '# Policy Decision Points\nA PDP evaluates access requests against defined policies in real time.' },
              { id: 'zt-l4', title: 'Attribute-Based Access Control',
                content: '## ABAC Model\nABAC grants access based on attributes of users, resources, and environment.' },
            ],
          },
        ],
      },
      {
        id: 'cloud-security',
        title: 'Cloud Data Protection Strategies',
        tagline: 'Secure Data Across Hybrid Environments',
        description: 'Deploy enterprise-grade data security policies across AWS, Azure, and GCP using NextLabs CloudAz for consistent, real-time authorization.',
        duration: '1.2 hr', level: 'Level 2',
        thumbnail: 'https://images.unsplash.com/photo-1558494949-ef010cbdcc48?auto=format&fit=crop&q=80&w=800',
        sections: [
          { title: 'Cloud Architecture', lessons: [
            { id: 'cl-l1', title: 'Multi-Cloud Topology', content: '# Multi-Cloud Topology\nUnderstanding distributed policy enforcement.' },
            { id: 'cl-l2', title: 'CloudAz Gateway', content: '## CloudAz Gateway\nThe central policy hub for all cloud workloads.' },
          ]},
        ],
      },
    ];

    // ── Helpers ───────────────────────────────────────────────────────────────
    const allLessons = (course) => course.sections.flatMap(s => s.lessons);

    const courseProgress = (course, completed) => {
      const ids = allLessons(course).map(l => l.id);
      if (!ids.length) return 0;
      return Math.round(ids.filter(id => completed.has(id)).length / ids.length * 100);
    };

    // ── Content Renderer ──────────────────────────────────────────────────────
    const ContentRenderer = memo(({ content }) => {
      if (!content) return null;
      const ytId = (url) => {
        const m = url.match(/(?:v=|youtu\.be\/)([^#&?]{11})/);
        return m ? m[1] : null;
      };
      return (
        <div style={{ fontFamily: 'Georgia, serif', lineHeight: 1.8 }}>
          {content.split('\n').map((line, i) => {
            const t = line.trim();
            if (!t) return <div key={i} style={{ height: 12 }} />;
            if (t.startsWith('# '))  return <h1 key={i} style={{ fontSize: 30, fontWeight: 900, marginBottom: 20, color: '#0F172A', fontFamily: "'Barlow Condensed', sans-serif", letterSpacing: '-0.02em' }}>{t.slice(2)}</h1>;
            if (t.startsWith('## ')) return <h2 key={i} style={{ fontSize: 20, fontWeight: 700, margin: '28px 0 10px', color: T.navy, borderLeft: `3px solid ${T.orange}`, paddingLeft: 12 }}>{t.slice(3)}</h2>;
            const img = t.match(/!\[.*?\]\((.*?)\)/);
            if (img) return <img key={i} src={img[1]} alt="" style={{ borderRadius: 8, width: '100%', margin: '20px 0', display: 'block' }} loading="lazy" />;
            const vid = ytId(t);
            if (vid) return (
              <div key={i} style={{ position: 'relative', paddingTop: '56.25%', margin: '28px 0', borderRadius: 10, overflow: 'hidden', background: '#000' }}>
                <iframe style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%' }}
                  src={`https://www.youtube.com/embed/${vid}`} frameBorder="0" allowFullScreen />
              </div>
            );
            return <p key={i} style={{ fontSize: 16, color: '#475569', marginBottom: 14 }}>{t}</p>;
          })}
        </div>
      );
    });

    // ── ProgressBar ───────────────────────────────────────────────────────────
    const ProgressBar = ({ value, color = T.navy, height = 4 }) => (
      <div style={{ height, background: '#E2E8F0', borderRadius: height, overflow: 'hidden' }}>
        <div style={{ height: '100%', width: `${value}%`, background: color, transition: 'width 0.6s cubic-bezier(.4,0,.2,1)' }} />
      </div>
    );

    // ── Badge ─────────────────────────────────────────────────────────────────
    const Badge = ({ children }) => (
      <span style={{ fontSize: 9, fontWeight: 800, letterSpacing: '0.12em', textTransform: 'uppercase',
        color: T.orange, background: '#FFF3E8', border: '1px solid #FDDBB4', borderRadius: 4, padding: '2px 7px' }}>
        {children}
      </span>
    );

    // ── Button ────────────────────────────────────────────────────────────────
    function Btn({ children, onClick, block, ghost, small, extraStyle = {} }) {
      const [hov, setHov] = useState(false);
      return (
        <button
          onClick={onClick}
          onMouseEnter={() => setHov(true)}
          onMouseLeave={() => setHov(false)}
          style={{
            display: block ? 'block' : 'inline-flex',
            width: block ? '100%' : 'auto',
            alignItems: 'center', justifyContent: 'center',
            padding: small ? '8px 16px' : '13px 22px',
            borderRadius: 8, cursor: 'pointer', fontWeight: 800,
            fontSize: small ? 10 : 11, letterSpacing: '0.12em', textTransform: 'uppercase',
            border: ghost ? '1.5px solid #CBD5E1' : 'none',
            background: ghost ? (hov ? '#F8FAFC' : '#fff') : (hov ? T.orange : T.navy),
            color: ghost ? T.slate : '#fff',
            transition: 'all 0.2s',
            fontFamily: "'DM Sans', sans-serif",
            ...extraStyle,
          }}>
          {children}
        </button>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    //  LANDING
    // ─────────────────────────────────────────────────────────────────────────
    function Landing({ courses, completed, onSelect }) {
      return (
        <div style={{ maxWidth: 1280, margin: '0 auto', padding: '48px 24px' }}>
          <div style={{ marginBottom: 44 }}>
            <p style={{ fontSize: 10, fontWeight: 800, letterSpacing: '0.25em', textTransform: 'uppercase', color: T.orange, marginBottom: 8 }}>
              NextLabs · Learning Platform
            </p>
            <h1 style={{ fontSize: 'clamp(28px, 5vw, 46px)', fontWeight: 900, color: '#0F172A',
              fontFamily: "'Barlow Condensed', sans-serif", letterSpacing: '-0.03em', lineHeight: 1.1, marginBottom: 8 }}>
              Security Training<br />Directory
            </h1>
            <p style={{ color: T.slate, fontSize: 15 }}>Select a module to begin your authorization training journey.</p>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 24 }}>
            {courses.map(c => (
              <CourseCard key={c.id} course={c} progress={courseProgress(c, completed)} onClick={() => onSelect(c)} />
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    //  COURSE CARD
    // ─────────────────────────────────────────────────────────────────────────
    const CourseCard = memo(({ course, progress, onClick }) => {
      const [hov, setHov] = useState(false);
      return (
        <div onClick={onClick} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
          style={{ background: '#fff', borderRadius: 12, overflow: 'hidden', cursor: 'pointer',
            border: `1px solid ${hov ? T.navy : '#E2E8F0'}`,
            boxShadow: hov ? '0 20px 40px -8px rgba(0,58,122,0.15)' : '0 1px 4px rgba(0,0,0,0.05)',
            transform: hov ? 'translateY(-4px)' : 'none',
            transition: 'all 0.25s cubic-bezier(.4,0,.2,1)', display: 'flex', flexDirection: 'column' }}>
          <div style={{ position: 'relative', paddingTop: '56.25%', background: '#F1F5F9', overflow: 'hidden' }}>
            <img src={course.thumbnail} alt={course.title} loading="lazy"
              style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', objectFit: 'cover',
                filter: hov ? 'none' : 'grayscale(60%) opacity(0.7)',
                transform: hov ? 'scale(1.06)' : 'scale(1)', transition: 'all 0.5s ease' }} />
            {progress > 0 && (
              <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: 3, background: '#E2E8F0' }}>
                <div style={{ height: '100%', width: `${progress}%`, background: '#22C55E' }} />
              </div>
            )}
          </div>
          <div style={{ padding: '20px 22px 22px', flex: 1, display: 'flex', flexDirection: 'column' }}>
            <div style={{ display: 'flex', gap: 8, marginBottom: 10, alignItems: 'center' }}>
              <Badge>{course.level}</Badge>
              <span style={{ fontSize: 9, fontWeight: 700, color: '#94A3B8', textTransform: 'uppercase', letterSpacing: '0.1em' }}>{course.duration}</span>
            </div>
            <h3 style={{ fontSize: 15, fontWeight: 800, color: hov ? T.navy : '#1E293B', lineHeight: 1.3, flex: 1, transition: 'color 0.2s', marginBottom: 16 }}>{course.title}</h3>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', paddingTop: 14, borderTop: '1px solid #F1F5F9' }}>
              <span style={{ fontSize: 10, fontWeight: 800, letterSpacing: '0.12em', textTransform: 'uppercase', color: hov ? T.orange : T.navy, transition: 'color 0.2s' }}>Open Module →</span>
              {progress > 0 && <span style={{ fontSize: 11, fontWeight: 900, color: '#16A34A' }}>{progress}%</span>}
            </div>
          </div>
        </div>
      );
    });

    // ─────────────────────────────────────────────────────────────────────────
    //  COURSE DETAILS
    // ─────────────────────────────────────────────────────────────────────────
    function Details({ course, user, completed, onStart, onEdit, onBack }) {
      const pct = courseProgress(course, completed);
      return (
        <div style={{ maxWidth: 1100, margin: '0 auto', padding: '40px 24px' }}>
          <button onClick={onBack} style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 10, fontWeight: 800,
            letterSpacing: '0.15em', textTransform: 'uppercase', color: T.slate, background: 'none', border: 'none', cursor: 'pointer', marginBottom: 36 }}>
            <Icon name="arrow-left" size={13} /> Back to Directory
          </button>

          <div className="details-grid" style={{ display: 'grid', gridTemplateColumns: '1fr 300px', gap: 56, alignItems: 'start' }}>
            <div>
              <Badge>{course.level}</Badge>
              <h1 style={{ fontSize: 'clamp(24px, 4vw, 42px)', fontWeight: 900, fontFamily: "'Barlow Condensed', sans-serif",
                letterSpacing: '-0.03em', color: '#0F172A', margin: '14px 0', lineHeight: 1.1 }}>{course.title}</h1>
              <p style={{ fontSize: 16, color: T.slate, lineHeight: 1.75, marginBottom: 36 }}>{course.description}</p>

              <p style={{ fontSize: 9, fontWeight: 900, letterSpacing: '0.3em', textTransform: 'uppercase', color: T.orange, marginBottom: 14 }}>Curriculum Breakdown</p>
              <div style={{ border: '1px solid #E2E8F0', borderRadius: 10, overflow: 'hidden' }}>
                {course.sections.map((sec, i) => (
                  <div key={i}>
                    <div style={{ padding: '10px 20px', background: '#F8FAFC', fontSize: 9, fontWeight: 800,
                      letterSpacing: '0.18em', textTransform: 'uppercase', color: '#94A3B8', borderBottom: '1px solid #F1F5F9' }}>{sec.title}</div>
                    {sec.lessons.map(l => {
                      const done = completed.has(l.id);
                      return (
                        <div key={l.id} style={{ padding: '13px 20px', display: 'flex', alignItems: 'center', gap: 14, borderBottom: '1px solid #F8FAFC' }}>
                          {done
                            ? <span style={{ width: 18, height: 18, background: '#22C55E', borderRadius: '50%', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, color: '#fff', fontSize: 11, fontWeight: 900, lineHeight: 1 }}>✓</span>
                            : <span style={{ width: 18, height: 18, border: '2px solid #CBD5E1', borderRadius: '50%', flexShrink: 0, display: 'inline-block' }} />
                          }
                          <span style={{ fontSize: 14, fontWeight: 600, color: done ? '#94A3B8' : '#334155', fontStyle: done ? 'italic' : 'normal' }}>{l.title}</span>
                        </div>
                      );
                    })}
                  </div>
                ))}
              </div>
            </div>

            <div style={{ position: 'sticky', top: 80, background: '#F8FAFC', border: '1px solid #E2E8F0', borderRadius: 12, padding: 26 }}>
              <div style={{ marginBottom: 18 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                  <span style={{ fontSize: 9, fontWeight: 800, letterSpacing: '0.15em', textTransform: 'uppercase', color: T.slate }}>Completion</span>
                  <span style={{ fontSize: 14, fontWeight: 900, color: T.navy }}>{pct}%</span>
                </div>
                <ProgressBar value={pct} />
              </div>
              <Btn onClick={onStart} block>{pct > 0 ? 'Resume Training' : 'Begin Training'}</Btn>
              {user && user.role === 'admin' && (
                <div style={{ marginTop: 10 }}>
                  <Btn onClick={onEdit} block ghost>Edit Module</Btn>
                </div>
              )}
              <div style={{ marginTop: 20, paddingTop: 18, borderTop: '1px solid #E2E8F0', display: 'flex', flexDirection: 'column', gap: 10 }}>
                {[['clock', course.duration], ['layers', course.level]].map(([icon, val]) => (
                  <span key={icon} style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 10, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: T.slate }}>
                    <Icon name={icon} size={13} /> {val}
                  </span>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    //  VIEWER
    // ─────────────────────────────────────────────────────────────────────────
    function Viewer({ course, activeLessonId, setActiveLessonId, completed, setCompleted, onExit }) {
      const [sideOpen, setSideOpen] = useState(false);
      const lessons = useMemo(() => allLessons(course), [course]);
      const active = useMemo(() => lessons.find(l => l.id === activeLessonId), [lessons, activeLessonId]);
      const pct = Math.round(lessons.filter(l => completed.has(l.id)).length / lessons.length * 100);

      const toggleDone = useCallback(() => {
        if (!active) return;
        setCompleted(prev => {
          const next = new Set(prev);
          next.has(active.id) ? next.delete(active.id) : next.add(active.id);
          return next;
        });
      }, [active, setCompleted]);

      const SidebarInner = () => (
        <div style={{ display: 'flex', flexDirection: 'column', height: '100%', width: 260, background: '#fff', borderRight: '1px solid #E2E8F0' }}>
          <div style={{ padding: '18px 18px 14px', borderBottom: '1px solid #F1F5F9', background: '#F8FAFC' }}>
            <button onClick={onExit} style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 9, fontWeight: 800,
              letterSpacing: '0.15em', textTransform: 'uppercase', color: T.slate, background: 'none', border: 'none', cursor: 'pointer', marginBottom: 14 }}>
              <Icon name="arrow-left" size={12} /> Exit Course
            </button>
            <ProgressBar value={pct} color="#22C55E" height={3} />
            <p style={{ fontSize: 9, fontWeight: 700, color: '#94A3B8', textTransform: 'uppercase', letterSpacing: '0.1em', marginTop: 6 }}>Progress: {pct}%</p>
          </div>
          <div style={{ flex: 1, overflowY: 'auto', padding: '14px 10px' }}>
            {course.sections.map((sec, si) => (
              <div key={si} style={{ marginBottom: 18 }}>
                <p style={{ fontSize: 8, fontWeight: 900, letterSpacing: '0.2em', textTransform: 'uppercase', color: T.orange, padding: '0 8px', marginBottom: 6 }}>{sec.title}</p>
                {sec.lessons.map(l => {
                  const isActive = l.id === activeLessonId, done = completed.has(l.id);
                  return (
                    <button key={l.id} onClick={() => { setActiveLessonId(l.id); setSideOpen(false); }}
                      style={{ width: '100%', textAlign: 'left', padding: '9px 10px', borderRadius: 6,
                        display: 'flex', alignItems: 'flex-start', gap: 8, cursor: 'pointer', border: 'none',
                        background: isActive ? T.navy : 'transparent', color: isActive ? '#fff' : '#475569',
                        fontWeight: 700, fontSize: 12, fontFamily: "'DM Sans', sans-serif", transition: 'all 0.15s', marginBottom: 2 }}>
                      <span style={{ width: 14, height: 14, borderRadius: '50%', flexShrink: 0, marginTop: 1,
                        display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                        background: done ? '#22C55E' : 'transparent',
                        border: done ? 'none' : `2px solid ${isActive ? 'rgba(255,255,255,0.4)' : '#CBD5E1'}`,
                        color: '#fff', fontSize: 9, fontWeight: 900, lineHeight: 1 }}>
                        {done && '✓'}
                      </span>
                      <span style={{ lineHeight: 1.3 }}>{l.title}</span>
                    </button>
                  );
                })}
              </div>
            ))}
          </div>
        </div>
      );

      return (
        <div style={{ display: 'flex', height: 'calc(100vh - 64px)', overflow: 'hidden', position: 'relative' }}>
          <div className="viewer-sidebar"><SidebarInner /></div>

          {sideOpen && (
            <div style={{ position: 'fixed', inset: 0, background: 'rgba(15,23,42,0.5)', zIndex: 50 }} onClick={() => setSideOpen(false)}>
              <div onClick={e => e.stopPropagation()} style={{ position: 'absolute', left: 0, top: 0, bottom: 0 }}>
                <SidebarInner />
              </div>
            </div>
          )}

          <div style={{ flex: 1, overflowY: 'auto', background: '#F8FAFC' }}>
            <div className="mobile-bar" style={{ padding: '12px 16px', background: '#fff', borderBottom: '1px solid #E2E8F0', alignItems: 'center', justifyContent: 'space-between' }}>
              <button onClick={() => setSideOpen(true)} style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 10, fontWeight: 800,
                textTransform: 'uppercase', letterSpacing: '0.1em', color: T.navy, background: 'none', border: 'none', cursor: 'pointer' }}>
                <Icon name="list" size={15} /> Contents
              </button>
              <span style={{ fontSize: 10, fontWeight: 900, color: '#94A3B8' }}>{pct}%</span>
            </div>

            <div style={{ maxWidth: 760, margin: '0 auto', padding: '44px 24px 80px' }}>
              {active ? (
                <div style={{ background: '#fff', borderRadius: 12, border: '1px solid #E2E8F0',
                  padding: 'clamp(24px, 5vw, 52px)', boxShadow: '0 4px 24px rgba(0,0,0,0.04)' }}>
                  <h1 style={{ fontSize: 'clamp(22px, 4vw, 34px)', fontWeight: 900, fontFamily: "'Barlow Condensed', sans-serif",
                    letterSpacing: '-0.02em', color: '#0F172A', marginBottom: 28, paddingBottom: 22, borderBottom: '1px solid #F1F5F9' }}>{active.title}</h1>
                  <ContentRenderer content={active.content} />
                  <div style={{ marginTop: 36, paddingTop: 28, borderTop: '1px solid #F1F5F9', display: 'flex', justifyContent: 'flex-end' }}>
                    <Btn onClick={toggleDone} extraStyle={{ background: completed.has(active.id) ? '#16A34A' : T.navy }}>
                      {completed.has(active.id) ? '✓ Completed' : 'Mark as Completed'}
                    </Btn>
                  </div>
                </div>
              ) : (
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: 400, color: '#CBD5E1' }}>
                  <Icon name="book-open" size={40} />
                  <p style={{ marginTop: 16, fontWeight: 800, fontSize: 11, letterSpacing: '0.3em', textTransform: 'uppercase' }}>Select a lesson to begin</p>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    //  EDITOR
    // ─────────────────────────────────────────────────────────────────────────
    function Editor({ course, onSave, onCancel }) {
      const [data, setData] = useState(() => JSON.parse(JSON.stringify(course)));
      const [editId, setEditId] = useState(() => course.sections?.[0]?.lessons?.[0]?.id || null);

      const active = useMemo(() => allLessons(data).find(l => l.id === editId), [data, editId]);

      const updateLesson = useCallback((id, field, val) =>
        setData(prev => ({ ...prev, sections: prev.sections.map(s => ({
          ...s, lessons: s.lessons.map(l => l.id === id ? { ...l, [field]: val } : l)
        }))})), []);

      const addLesson = useCallback((si) => {
        const id = `l-${Date.now()}`;
        setData(prev => {
          const d = JSON.parse(JSON.stringify(prev));
          d.sections[si].lessons.push({ id, title: 'Untitled Lesson', content: '# Content' });
          return d;
        });
        setEditId(id);
      }, []);

      const addSection = useCallback(() =>
        setData(prev => ({ ...prev, sections: [...prev.sections, { title: 'New Section', lessons: [] }] })), []);

      return (
        <div style={{ height: 'calc(100vh - 64px)', display: 'flex', flexDirection: 'column', background: '#F8FAFC' }}>
          <div style={{ height: 54, background: '#fff', borderBottom: '1px solid #E2E8F0', padding: '0 18px',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16, flexShrink: 0,
            boxShadow: '0 1px 4px rgba(0,0,0,0.05)' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, flex: 1, minWidth: 0 }}>
              <span style={{ fontSize: 8, fontWeight: 900, letterSpacing: '0.25em', textTransform: 'uppercase',
                color: T.orange, background: '#FFF3E8', border: '1px solid #FDDBB4', borderRadius: 4, padding: '3px 8px', flexShrink: 0 }}>Editor</span>
              <input value={data.title} onChange={e => setData(d => ({ ...d, title: e.target.value }))}
                style={{ flex: 1, fontSize: 15, fontWeight: 800, background: 'transparent', border: 'none', outline: 'none', color: '#0F172A', minWidth: 0, fontFamily: "'DM Sans', sans-serif" }} />
            </div>
            <div style={{ display: 'flex', gap: 8, flexShrink: 0 }}>
              <Btn ghost small onClick={onCancel}>Discard</Btn>
              <Btn small onClick={() => onSave(data)}>Save</Btn>
            </div>
          </div>

          <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
            <div style={{ width: 230, background: '#fff', borderRight: '1px solid #E2E8F0', overflowY: 'auto', padding: '14px 10px', flexShrink: 0 }}>
              <p style={{ fontSize: 8, fontWeight: 900, letterSpacing: '0.2em', textTransform: 'uppercase', color: '#94A3B8', marginBottom: 12, paddingLeft: 8 }}>Structure</p>
              {data.sections.map((sec, si) => (
                <div key={si} style={{ marginBottom: 16 }}>
                  <input value={sec.title} onChange={e => {
                    const d = JSON.parse(JSON.stringify(data)); d.sections[si].title = e.target.value; setData(d);
                  }} style={{ fontSize: 9, fontWeight: 900, letterSpacing: '0.15em', textTransform: 'uppercase',
                    color: T.slate, background: 'transparent', border: 'none', outline: 'none', width: '100%', padding: '2px 8px', fontFamily: "'DM Sans', sans-serif" }} />
                  {sec.lessons.map(l => (
                    <button key={l.id} onClick={() => setEditId(l.id)}
                      style={{ width: '100%', textAlign: 'left', padding: '8px 10px', borderRadius: 6, fontSize: 12, fontWeight: 600,
                        cursor: 'pointer', border: 'none', background: l.id === editId ? '#EFF6FF' : 'transparent',
                        color: l.id === editId ? T.navy : '#475569', fontFamily: "'DM Sans', sans-serif",
                        borderLeft: l.id === editId ? `2px solid ${T.navy}` : '2px solid transparent', marginBottom: 2 }}>
                      {l.title}
                    </button>
                  ))}
                  <button onClick={() => addLesson(si)} style={{ display: 'flex', alignItems: 'center', gap: 6,
                    fontSize: 9, fontWeight: 700, color: '#94A3B8', background: 'none', border: 'none', cursor: 'pointer', padding: '4px 10px', fontFamily: "'DM Sans', sans-serif" }}>
                    <Icon name="plus" size={10} /> Add Lesson
                  </button>
                </div>
              ))}
              <button onClick={addSection} style={{ width: '100%', padding: '8px 0', border: '1px dashed #CBD5E1',
                borderRadius: 6, fontSize: 9, fontWeight: 800, letterSpacing: '0.15em', textTransform: 'uppercase',
                color: '#94A3B8', background: 'none', cursor: 'pointer', fontFamily: "'DM Sans', sans-serif" }}>
                + New Section
              </button>
            </div>

            {active ? (
              <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
                <div style={{ flex: 1, display: 'flex', flexDirection: 'column', borderRight: '1px solid #E2E8F0' }}>
                  <input value={active.title} onChange={e => updateLesson(editId, 'title', e.target.value)}
                    style={{ padding: '16px 22px', fontSize: 18, fontWeight: 900, border: 'none', outline: 'none',
                      borderBottom: '1px solid #E2E8F0', background: '#fff', color: '#0F172A', fontFamily: "'DM Sans', sans-serif" }} />
                  <textarea value={active.content} onChange={e => updateLesson(editId, 'content', e.target.value)}
                    style={{ flex: 1, padding: '18px 22px', fontFamily: "'JetBrains Mono', monospace", fontSize: 13,
                      border: 'none', outline: 'none', resize: 'none', color: '#334155', background: '#FAFAFA', lineHeight: 1.7 }} />
                </div>
                <div style={{ flex: 1, overflowY: 'auto', padding: '28px', background: '#fff', display: 'none' }} className="preview-pane">
                  <ContentRenderer content={active.content} />
                </div>
              </div>
            ) : (
              <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#CBD5E1', flexDirection: 'column', gap: 12 }}>
                <Icon name="mouse-pointer-2" size={28} />
                <span style={{ fontSize: 10, fontWeight: 800, letterSpacing: '0.3em', textTransform: 'uppercase' }}>Select a lesson</span>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    //  LOGIN
    // ─────────────────────────────────────────────────────────────────────────
    function Login({ onLogin }) {
      const [email, setEmail] = useState('');
      return (
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: 'calc(100vh - 64px)', padding: 24, background: '#F8FAFC' }}>
          <div style={{ background: '#fff', border: '1px solid #E2E8F0', borderRadius: 14,
            padding: 'clamp(28px, 5vw, 48px)', width: '100%', maxWidth: 400, boxShadow: '0 20px 60px rgba(0,58,122,0.08)' }}>
            <div style={{ width: 46, height: 46, background: T.navy, borderRadius: 10, display: 'inline-flex',
              alignItems: 'center', justifyContent: 'center', marginBottom: 22, boxShadow: '0 8px 20px rgba(0,58,122,0.25)' }}>
              <Icon name="shield-check" size={22} />
            </div>
            <h2 style={{ fontSize: 22, fontWeight: 900, fontFamily: "'Barlow Condensed', sans-serif",
              letterSpacing: '-0.01em', color: T.navy, marginBottom: 4 }}>Access Portal</h2>
            <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.15em', textTransform: 'uppercase', color: '#94A3B8', marginBottom: 28 }}>
              NextLabs Central Authentication
            </p>
            <div style={{ marginBottom: 18 }}>
              <label style={{ display: 'block', fontSize: 9, fontWeight: 800, letterSpacing: '0.15em',
                textTransform: 'uppercase', color: T.slate, marginBottom: 8 }}>Corporate Email</label>
              <input type="email" placeholder="user@nextlabs.com" value={email} onChange={e => setEmail(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && email && onLogin(email)}
                style={{ width: '100%', padding: '13px 15px', border: '1.5px solid #E2E8F0', borderRadius: 8,
                  fontSize: 15, outline: 'none', color: '#1E293B', background: '#F8FAFC', fontFamily: "'DM Sans', sans-serif" }} />
            </div>
            <Btn block onClick={() => email && onLogin(email)}>Verify Identity</Btn>
            <p style={{ marginTop: 24, fontSize: 9, textAlign: 'center', color: '#CBD5E1', fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase' }}>
              Secured by Dynamic Authorization Platform
            </p>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    //  ROOT APP
    // ─────────────────────────────────────────────────────────────────────────
    function App() {
      const [view, setView]       = useState('landing');
      const [courses, setCourses] = useState(() => {
        try { const s = localStorage.getItem('nl_courses'); return s ? JSON.parse(s) : SEED; } catch { return SEED; }
      });
      const [courseId, setCourseId] = useState(null);
      const [user, setUser]       = useState(null);
      const [completed, setCompleted] = useState(new Set());
      const [lessonId, setLessonId]   = useState(null);
      const [syncMsg, setSyncMsg]     = useState('');

      // Auto-save to localStorage whenever courses change
      useEffect(() => {
        try { localStorage.setItem('nl_courses', JSON.stringify(courses)); } catch(e) {}
      }, [courses]);

      const course = useMemo(() => courses.find(c => c.id === courseId), [courses, courseId]);

      const login  = useCallback((email) => {
        setUser({ email, name: email.split('@')[0], role: 'admin' });
        setView('landing');
      }, []);

      const logout = useCallback(() => { setUser(null); setView('landing'); }, []);
      const openCourse = useCallback((c) => { setCourseId(c.id); setView('details'); }, []);

      const startCourse = useCallback(() => {
        if (!user) return setView('login');
        const first = allLessons(course).find(l => !completed.has(l.id))?.id || allLessons(course)[0]?.id;
        setLessonId(first);
        setView('viewer');
      }, [user, course, completed]);

      const saveCourse = useCallback((updated) => {
        setCourses(prev => prev.map(c => c.id === updated.id ? updated : c));
        setCourseId(updated.id);
        setView('details');
      }, []);

      const newCourse = useCallback(() => {
        const id = `course-${Date.now()}`;
        const c = {
          id, title: 'New Security Module', tagline: 'Summary', description: 'Description here.',
          duration: '30 min', level: 'Level 1',
          thumbnail: 'https://images.unsplash.com/photo-1558494949-ef010cbdcc48?auto=format&fit=crop&q=80&w=800',
          sections: [{ title: 'Phase 1', lessons: [{ id: `l-${Date.now()}`, title: 'Introduction', content: '# Introduction\nContent goes here.' }] }]
        };
        setCourses(prev => [...prev, c]);
        setCourseId(id);
        setView('editor');
      }, []);

      // ── Export: download all courses as a .json file ───────────────────────
      const exportCourses = useCallback(() => {
        const blob = new Blob([JSON.stringify(courses, null, 2)], { type: 'application/json' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = `nextlabs-courses-${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        flash('✓ Downloaded! Save to OneDrive or SharePoint.');
      }, [courses]);

      // ── Import: load courses from a .json file ─────────────────────────────
      const importCourses = useCallback(() => {
        const input = document.createElement('input');
        input.type  = 'file';
        input.accept = '.json';
        input.onchange = (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            try {
              const data = JSON.parse(ev.target.result);
              if (!Array.isArray(data)) throw new Error('Invalid format');
              setCourses(data);
              setView('landing');
              flash('✓ Courses loaded successfully!');
            } catch {
              flash('✗ Invalid file. Please upload a NextLabs courses .json file.');
            }
          };
          reader.readAsText(file);
        };
        input.click();
      }, []);

      const flash = (msg) => {
        setSyncMsg(msg);
        setTimeout(() => setSyncMsg(''), 3500);
      };

      return (
        <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', background: '#fff', fontFamily: "'DM Sans', sans-serif" }}>

          {/* ── Toast notification ── */}
          {syncMsg && (
            <div style={{ position: 'fixed', bottom: 24, left: '50%', transform: 'translateX(-50%)', zIndex: 999,
              background: syncMsg.startsWith('✓') ? '#0F4C2A' : '#7F1D1D',
              color: '#fff', padding: '12px 24px', borderRadius: 10, fontSize: 13, fontWeight: 700,
              boxShadow: '0 8px 24px rgba(0,0,0,0.2)', whiteSpace: 'nowrap' }}>
              {syncMsg}
            </div>
          )}

          {/* ── Header ── */}
          <header style={{ height: 64, background: '#fff', borderBottom: '1px solid #E2E8F0', display: 'flex',
            alignItems: 'center', justifyContent: 'space-between', padding: '0 24px',
            position: 'sticky', top: 0, zIndex: 100, boxShadow: '0 1px 0 #F1F5F9' }}>
            <button onClick={() => setView('landing')}
              style={{ display: 'flex', alignItems: 'center', gap: 10, background: 'none', border: 'none', cursor: 'pointer' }}>
              <div style={{ background: T.navy, color: '#fff', width: 34, height: 34, borderRadius: 8,
                display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <Icon name="layout" size={16} />
              </div>
              <span style={{ fontWeight: 900, fontSize: 13, letterSpacing: '0.08em', textTransform: 'uppercase',
                color: T.navy, fontFamily: "'Barlow Condensed', sans-serif" }}>NextLabs / Academy</span>
            </button>

            <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
              {user && user.role === 'admin' && (
                <>
                  {/* Save to file */}
                  <button onClick={exportCourses} title="Download courses as JSON — save to OneDrive / SharePoint"
                    style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 9, fontWeight: 900,
                      letterSpacing: '0.15em', textTransform: 'uppercase', color: T.slate,
                      background: '#F8FAFC', border: '1px solid #E2E8F0', borderRadius: 6,
                      padding: '6px 12px', cursor: 'pointer', fontFamily: "'DM Sans', sans-serif" }}>
                    <Icon name="download" size={12} /> Save File
                  </button>

                  {/* Load from file */}
                  <button onClick={importCourses} title="Load courses from a previously saved JSON file"
                    style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 9, fontWeight: 900,
                      letterSpacing: '0.15em', textTransform: 'uppercase', color: T.slate,
                      background: '#F8FAFC', border: '1px solid #E2E8F0', borderRadius: 6,
                      padding: '6px 12px', cursor: 'pointer', fontFamily: "'DM Sans', sans-serif" }}>
                    <Icon name="upload" size={12} /> Load File
                  </button>

                  <div style={{ width: 1, height: 20, background: '#E2E8F0' }} />

                  <button onClick={newCourse} style={{ fontSize: 9, fontWeight: 900, letterSpacing: '0.2em',
                    textTransform: 'uppercase', color: T.navy, background: 'none', border: 'none', cursor: 'pointer', fontFamily: "'DM Sans', sans-serif" }}>
                    + New Course
                  </button>
                </>
              )}
              {user ? (
                <>
                  <span style={{ fontSize: 13, fontWeight: 700, color: T.slate }}>{user.name}</span>
                  <button onClick={logout} style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#94A3B8', display: 'flex', alignItems: 'center' }}>
                    <Icon name="log-out" size={16} />
                  </button>
                </>
              ) : (
                <Btn small onClick={() => setView('login')}>Sign In</Btn>
              )}
            </div>
          </header>

          {/* ── Views ── */}
          <main style={{ flex: 1 }}>
            {view === 'landing' && <Landing courses={courses} completed={completed} onSelect={openCourse} />}
            {view === 'details' && course && (
              <Details course={course} user={user} completed={completed}
                onStart={startCourse} onEdit={() => setView('editor')} onBack={() => setView('landing')} />
            )}
            {view === 'login'  && <Login onLogin={login} />}
            {view === 'viewer' && course && (
              <Viewer course={course} activeLessonId={lessonId} setActiveLessonId={setLessonId}
                completed={completed} setCompleted={setCompleted} onExit={() => setView('details')} />
            )}
            {view === 'editor' && course && (
              <Editor course={course} onSave={saveCourse} onCancel={() => setView('details')} />
            )}
          </main>
        </div>
      );
    }

    // ── Mount ──────────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
