<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functional | NextLabs Academy</title>
    <!-- Load React and Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --brand-blue: #004990;
            --brand-orange: #F47920;
            --bg-main: #ffffff;
            --bg-subtle: #f8fafc;
            --border-color: #e2e8f0;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-main);
            color: #1e293b;
            font-size: 16px; 
        }

        /* Course Content Styling - Large Format Readability */
        .prose h1 { font-size: 2.5rem; font-weight: 800; color: #0f172a; margin-bottom: 1.75rem; letter-spacing: -0.025em; line-height: 1.1; }
        .prose h2 { font-size: 1.75rem; font-weight: 700; color: #1e293b; margin-top: 2.5rem; margin-bottom: 1.25rem; border-left: 4px solid var(--brand-orange); padding-left: 1rem; }
        .prose p { margin-bottom: 1.5rem; line-height: 1.8; font-size: 1.125rem; color: #334155; }
        .prose img { border-radius: 4px; margin: 2.5rem 0; width: 100%; border: 1px solid var(--border-color); }
        
        .video-container { 
            position: relative; 
            padding-bottom: 56.25%; 
            height: 0; 
            overflow: hidden; 
            margin: 2.5rem 0; 
            border-radius: 4px;
            background: #000;
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .functional-card {
            transition: all 0.2s ease;
            border: 1px solid var(--border-color);
        }
        .functional-card:hover {
            border-color: var(--brand-blue);
            transform: translateY(-2px);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--brand-blue); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const INITIAL_COURSES = [
            {
                id: "zero-trust-foundations",
                title: "Zero Trust Data-Centric Security Foundations",
                tagline: "The Core Principles of Data Protection",
                description: "Master the fundamentals of NextLabs' Zero Trust architecture. Learn how to protect data across applications, databases, and file repositories using dynamic authorization. This course covers the intersection of policy enforcement and data visibility.",
                duration: "45 mins",
                level: "Level 1",
                thumbnail: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=800",
                sections: [
                    {
                        title: "Introduction to Zero Trust",
                        lessons: [
                            { id: "zt-1", title: "The NextLabs Vision", content: "# The NextLabs Vision\nProtecting data anytime and anywhere.\n\n![Secure Data](https://images.unsplash.com/photo-1563986768609-322da13575f3?auto=format&fit=crop&q=80&w=800)\n\nOur goal is to automate the enforcement of security controls.\n\nhttps://www.youtube.com/watch?v=dQw4w9WgXcQ" },
                            { id: "zt-2", title: "Dynamic Authorization Strategy", content: "## Technology Overview\nOur patented dynamic authorization technology and industry leading attribute-based zero trust policy platform." }
                        ]
                    }
                ]
            }
        ];

        function App() {
            const [view, setView] = useState('landing');
            const [courses, setCourses] = useState(() => {
                const saved = localStorage.getItem('nl_courses');
                return saved ? JSON.parse(saved) : INITIAL_COURSES;
            });
            const [selectedCourseId, setSelectedCourseId] = useState(null);
            const [user, setUser] = useState(() => JSON.parse(localStorage.getItem('lms_user')));
            const [completedLessons, setCompletedLessons] = useState(() => JSON.parse(localStorage.getItem('lms_progress')) || []);
            const [activeLessonId, setActiveLessonId] = useState(null);

            const selectedCourse = useMemo(() => 
                courses.find(c => c.id === selectedCourseId), 
            [courses, selectedCourseId]);

            useEffect(() => {
                localStorage.setItem('nl_courses', JSON.stringify(courses));
            }, [courses]);

            useEffect(() => {
                localStorage.setItem('lms_progress', JSON.stringify(completedLessons));
            }, [completedLessons]);

            const handleLogin = (email) => {
                const newUser = { email, role: 'admin', name: email.split('@')[0] };
                setUser(newUser);
                localStorage.setItem('lms_user', JSON.stringify(newUser));
                setView('landing');
            };

            const handleLogout = () => {
                setUser(null);
                localStorage.removeItem('lms_user');
                setView('landing');
            };

            const handleSaveCourse = (updatedCourse) => {
                setCourses(courses.map(c => c.id === updatedCourse.id ? updatedCourse : c));
                setSelectedCourseId(updatedCourse.id);
                setView('details');
            };

            const handleCreateNewCourse = () => {
                const newId = `course-${Date.now()}`;
                const newCourse = {
                    id: newId,
                    title: "Advanced Policy Management",
                    tagline: "Scalable security for the modern enterprise",
                    description: "Learn how to build and deploy complex ABAC policies across global environments.",
                    duration: "1.5 hours",
                    level: "Level 2",
                    thumbnail: "https://images.unsplash.com/photo-1558494949-ef010cbdcc48?auto=format&fit=crop&q=80&w=800",
                    sections: [
                        {
                            title: "Setup",
                            lessons: [
                                { id: `lesson-${Date.now()}`, title: "Environment Config", content: "# Environment Configuration\nReady to scale." }
                            ]
                        }
                    ]
                };
                setCourses(prev => [...prev, newCourse]);
                setSelectedCourseId(newId);
                setView('editor');
            };

            const getCourseProgress = (course) => {
                if (!course || !course.sections) return 0;
                const courseLessonIds = course.sections.flatMap(s => s.lessons.map(l => l.id));
                if (courseLessonIds.length === 0) return 0;
                const completedCount = courseLessonIds.filter(id => completedLessons.includes(id)).length;
                return Math.round((completedCount / courseLessonIds.length) * 100);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="sticky top-0 z-50 bg-white border-b border-slate-200 h-16 flex items-center justify-between px-8">
                        <div className="flex items-center gap-8">
                            <button onClick={() => setView('landing')} className="flex items-center gap-3">
                                <div className="bg-[#004990] text-white p-1.5 rounded-sm">
                                    <Icon name="layout" size={20} />
                                </div>
                                <span className="font-bold text-[#004990] text-base tracking-tight uppercase">Functional / Academy</span>
                            </button>
                        </div>
                        
                        <div className="flex items-center gap-6">
                            {user ? (
                                <div className="flex items-center gap-6">
                                    {user.role === 'admin' && (
                                        <button onClick={handleCreateNewCourse} className="text-slate-500 hover:text-[#004990] font-semibold text-sm">
                                            New Course
                                        </button>
                                    )}
                                    <div className="h-4 w-[1px] bg-slate-200"></div>
                                    <div className="flex items-center gap-3">
                                        <span className="text-sm font-semibold text-slate-500">{user.name}</span>
                                        <button onClick={handleLogout} className="text-slate-400 hover:text-red-500">
                                            <Icon name="log-out" size={18} />
                                        </button>
                                    </div>
                                </div>
                            ) : (
                                <button onClick={() => setView('login')} className="text-slate-600 hover:text-[#004990] text-sm font-bold uppercase tracking-wider">
                                    Sign In
                                </button>
                            )}
                        </div>
                    </header>

                    <main className="flex-1">
                        {view === 'landing' && (
                            <LandingPage 
                                courses={courses} 
                                user={user}
                                getProgress={getCourseProgress}
                                onSelect={(c) => { setSelectedCourseId(c.id); setView('details'); }} 
                            />
                        )}
                        {view === 'details' && (
                            <CourseDetails 
                                course={selectedCourse} 
                                user={user} 
                                progress={getCourseProgress(selectedCourse)}
                                completedLessons={completedLessons}
                                onStart={() => { 
                                    if(!user) return setView('login'); 
                                    const firstIncomplete = selectedCourse.sections.flatMap(s => s.lessons).find(l => !completedLessons.includes(l.id))?.id;
                                    setActiveLessonId(firstIncomplete || selectedCourse.sections[0]?.lessons[0]?.id); 
                                    setView('viewer'); 
                                }} 
                                onEdit={() => setView('editor')}
                                onBack={() => setView('landing')} 
                            />
                        )}
                        {view === 'login' && <LoginPage onLogin={handleLogin} />}
                        {view === 'viewer' && (
                            <CourseViewer 
                                courseData={selectedCourse} 
                                activeLessonId={activeLessonId} 
                                setActiveLessonId={setActiveLessonId} 
                                completedLessons={completedLessons} 
                                setCompletedLessons={setCompletedLessons}
                                onExit={() => setView('details')}
                            />
                        )}
                        {view === 'editor' && (
                            <CourseEditor 
                                course={selectedCourse} 
                                onSave={handleSaveCourse} 
                                onCancel={() => setView('details')} 
                            />
                        )}
                    </main>
                </div>
            );
        }

        function LandingPage({ courses, onSelect, getProgress }) {
            return (
                <div className="max-w-7xl mx-auto px-8 py-12">
                    <div className="flex items-center justify-between mb-10 pb-6 border-b border-slate-100">
                        <div>
                            <h1 className="text-3xl font-bold text-slate-900">Training Directory</h1>
                            <p className="text-base text-slate-400 mt-1">Enterprise-grade security modules for Zero Trust data-centric policy management.</p>
                        </div>
                    </div>

                    <div className="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                        {courses.map(course => {
                            const progress = getProgress(course);
                            return (
                                <div key={course.id} onClick={() => onSelect(course)} className="functional-card bg-white rounded-md overflow-hidden cursor-pointer flex flex-col group">
                                    <div className="aspect-[16/9] relative overflow-hidden bg-slate-100 border-b border-slate-100">
                                        <img src={course.thumbnail} className="w-full h-full object-cover grayscale opacity-60 group-hover:grayscale-0 group-hover:opacity-100 transition-all duration-300" />
                                        {progress > 0 && (
                                            <div className="absolute bottom-0 left-0 h-1.5 bg-green-500 transition-all duration-500" style={{ width: `${progress}%` }}></div>
                                        )}
                                    </div>
                                    <div className="p-6 flex flex-col flex-1">
                                        <div className="flex items-center gap-3 mb-4">
                                            <span className="text-[11px] font-bold text-slate-400 uppercase tracking-widest">{course.level}</span>
                                            <span className="text-slate-300">•</span>
                                            <span className="text-[11px] font-bold text-slate-400 uppercase tracking-widest">{course.duration}</span>
                                        </div>
                                        <h3 className="font-bold text-xl text-slate-800 mb-3 leading-tight line-clamp-2">{course.title}</h3>
                                        <p className="text-sm text-slate-500 line-clamp-2 mb-6 leading-relaxed">{course.tagline}</p>
                                        
                                        <div className="mt-auto flex items-center justify-between pt-4 border-t border-slate-50">
                                            <span className="text-xs font-bold text-[#004990] uppercase tracking-tighter group-hover:text-[#F47920] transition-colors">Start Execution</span>
                                            {progress > 0 && <span className="text-sm font-black text-green-600">{progress}%</span>}
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function CourseDetails({ course, onStart, onEdit, onBack, user, progress, completedLessons }) {
            if (!course) return null;
            return (
                <div className="bg-white">
                    <div className="max-w-6xl mx-auto px-8 py-16">
                        <button onClick={onBack} className="flex items-center gap-2 text-slate-400 font-bold text-[11px] uppercase tracking-[0.25em] mb-12 hover:text-[#004990] transition-colors">
                            <Icon name="arrow-left" size={14} /> Back to Directory
                        </button>
                        
                        <div className="grid lg:grid-cols-3 gap-20">
                            <div className="lg:col-span-2">
                                <h1 className="text-5xl font-black text-slate-900 mb-8 tracking-tighter leading-[1.1]">{course.title}</h1>
                                <p className="text-slate-500 text-xl mb-16 leading-relaxed max-w-3xl">{course.description}</p>
                                
                                <div className="space-y-10">
                                    <h2 className="text-sm font-black uppercase tracking-[0.4em] text-[#F47920] border-b border-slate-100 pb-4">Curriculum Schema</h2>
                                    <div className="divide-y border border-slate-200 rounded-md overflow-hidden bg-white shadow-sm">
                                        {course.sections.map((sec, i) => (
                                            <div key={i}>
                                                <div className="px-8 py-4 bg-slate-50/50 border-b flex items-center justify-between">
                                                    <h4 className="font-bold text-slate-700 text-xs uppercase tracking-widest">{sec.title}</h4>
                                                    <span className="text-[10px] text-slate-400 font-bold uppercase">{sec.lessons.length} Nodes</span>
                                                </div>
                                                <div className="divide-y divide-slate-100">
                                                    {sec.lessons.map(lesson => (
                                                        <div key={lesson.id} className="px-8 py-5 flex items-center justify-between hover:bg-slate-50 transition-colors">
                                                            <div className="flex items-center gap-5">
                                                                <Icon 
                                                                    name={completedLessons.includes(lesson.id) ? "check-circle" : "circle"} 
                                                                    size={20} 
                                                                    className={completedLessons.includes(lesson.id) ? 'text-green-500' : 'text-slate-300'} 
                                                                />
                                                                <span className="text-slate-700 font-semibold text-base">{lesson.title}</span>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-1">
                                <div className="sticky top-28 border border-slate-200 rounded-md p-10 space-y-10 bg-slate-50/50">
                                    <div>
                                        <div className="flex justify-between items-end mb-4">
                                            <span className="text-[12px] font-bold text-slate-400 uppercase tracking-widest">Progress State</span>
                                            <span className="text-lg font-black text-[#004990]">{progress}%</span>
                                        </div>
                                        <div className="h-2.5 w-full bg-slate-200 rounded-full overflow-hidden">
                                            <div className="h-full bg-[#004990] transition-all duration-1000" style={{ width: `${progress}%` }}></div>
                                        </div>
                                    </div>

                                    <button 
                                        onClick={onStart}
                                        className="w-full bg-[#004990] text-white py-5 rounded font-black text-sm uppercase tracking-[0.2em] hover:bg-[#F47920] transition-all transform active:scale-[0.98] shadow-md"
                                    >
                                        {progress > 0 ? 'Resume Course' : 'Begin Training'}
                                    </button>

                                    {user?.role === 'admin' && (
                                        <button onClick={onEdit} className="w-full py-3.5 border border-slate-300 text-slate-600 text-[11px] font-bold uppercase tracking-widest hover:bg-white hover:border-[#004990] hover:text-[#004990] transition-all">
                                            Modify Course Data
                                        </button>
                                    )}

                                    <div className="pt-10 border-t border-slate-200 space-y-5">
                                        <div className="flex items-center gap-5 text-slate-500">
                                            <Icon name="clock" size={18} />
                                            <span className="text-xs font-bold uppercase tracking-widest">{course.duration} TOTAL TIME</span>
                                        </div>
                                        <div className="flex items-center gap-5 text-slate-500">
                                            <Icon name="layers" size={18} />
                                            <span className="text-xs font-bold uppercase tracking-widest">{course.level} CLASSIFICATION</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function LoginPage({ onLogin }) {
            const [email, setEmail] = useState('');
            return (
                <div className="flex justify-center items-center h-[85vh] bg-slate-50 px-8">
                    <div className="bg-white p-12 w-full max-w-md border border-slate-200 rounded-md shadow-xl">
                        <div className="mb-12">
                            <h2 className="text-xl font-black uppercase tracking-[0.3em] text-[#004990]">SSO Authentication</h2>
                            <p className="text-sm text-slate-400 mt-3 font-medium">Valid credentials required to access policy datasets.</p>
                        </div>
                        <form className="space-y-8" onSubmit={(e) => { e.preventDefault(); onLogin(email); }}>
                            <div>
                                <label className="block text-[11px] font-bold uppercase text-slate-400 mb-2.5 tracking-wider">Corporate Email</label>
                                <input 
                                    className="w-full px-5 py-4 text-base border border-slate-200 rounded outline-none focus:border-[#004990] bg-slate-50 focus:bg-white transition-all font-medium" 
                                    type="email" 
                                    placeholder="operator@nextlabs.com"
                                    required 
                                    onChange={e => setEmail(e.target.value)} 
                                />
                            </div>
                            <button className="w-full bg-[#004990] text-white py-5 text-xs font-black uppercase tracking-[0.4em] hover:bg-[#F47920] transition-all rounded shadow-md transform active:scale-[0.98]">
                                Authorize Session
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        function ContentRenderer({ content }) {
            if (!content) return null;
            const extractYTId = (url) => {
                const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
                const match = url.match(regExp);
                return (match && match[7].length === 11) ? match[7] : null;
            };

            const lines = content.split('\n');
            return (
                <div className="prose max-w-none">
                    {lines.map((line, i) => {
                        const trimmed = line.trim();
                        if (trimmed.startsWith('# ')) return <h1 key={i}>{trimmed.replace('# ', '')}</h1>;
                        if (trimmed.startsWith('## ')) return <h2 key={i}>{trimmed.replace('## ', '')}</h2>;
                        const imgMatch = trimmed.match(/!\[(.*?)\]\((.*?)\)/);
                        if (imgMatch) return <img key={i} src={imgMatch[2]} alt={imgMatch[1]} />;
                        const ytId = extractYTId(trimmed);
                        if (ytId) return (
                            <div key={i} className="video-container">
                                <iframe src={`https://www.youtube.com/embed/${ytId}`} frameBorder="0" allowFullScreen></iframe>
                            </div>
                        );
                        return trimmed === "" ? <div key={i} className="h-6" /> : <p key={i}>{trimmed}</p>;
                    })}
                </div>
            );
        }

        function CourseViewer({ courseData, activeLessonId, setActiveLessonId, completedLessons, setCompletedLessons, onExit }) {
            if (!courseData) return null;
            const allLessons = courseData.sections.flatMap(s => s.lessons);
            const activeLesson = allLessons.find(l => l.id === activeLessonId);
            const progress = Math.round((completedLessons.filter(id => allLessons.some(l => l.id === id)).length / allLessons.length) * 100);

            const toggleCompletion = () => {
                const isCompleted = completedLessons.includes(activeLesson.id);
                if (isCompleted) {
                    setCompletedLessons(completedLessons.filter(id => id !== activeLesson.id));
                } else {
                    setCompletedLessons([...completedLessons, activeLesson.id]);
                }
            };

            return (
                <div className="flex h-[calc(100vh-64px)] bg-white overflow-hidden">
                    <div className="w-80 bg-slate-50 border-r flex flex-col">
                        <div className="p-8 border-b bg-white">
                            <button onClick={onExit} className="mb-8 text-[11px] font-bold text-slate-400 hover:text-[#004990] flex items-center gap-2 uppercase tracking-[0.2em] transition-colors">
                                <Icon name="arrow-left" size={14} /> Close Player
                            </button>
                            <h4 className="text-sm font-black text-slate-800 uppercase leading-snug mb-5">{courseData.title}</h4>
                            <div className="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
                                <div className="h-full bg-green-500 transition-all duration-700" style={{ width: `${progress}%` }}></div>
                            </div>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-5 space-y-8">
                            {courseData.sections.map((sec, sIdx) => (
                                <div key={sIdx}>
                                    <p className="text-[10px] font-black uppercase text-[#F47920] mb-4 px-3 tracking-[0.3em]">{sec.title}</p>
                                    <div className="space-y-1.5">
                                        {sec.lessons.map(l => (
                                            <button 
                                                key={l.id} 
                                                onClick={() => setActiveLessonId(l.id)} 
                                                className={`flex items-start gap-4 w-full text-left px-4 py-4 rounded-md text-[13px] font-bold transition-all ${l.id === activeLessonId ? 'bg-[#004990] text-white shadow-lg translate-x-1' : 'hover:bg-slate-200 text-slate-600'}`}
                                            >
                                                <Icon name={completedLessons.includes(l.id) ? "check-square" : "square"} size={16} className="mt-0.5" />
                                                <span className="flex-1">{l.title}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="flex-1 bg-white overflow-y-auto scroll-smooth">
                        <div className="max-w-4xl mx-auto px-16 py-20 pb-64">
                            {activeLesson && (
                                <>
                                    <div className="mb-16 pb-10 border-b border-slate-100">
                                        <h1 className="text-5xl font-black text-slate-900 tracking-tighter leading-[1.1]">{activeLesson.title}</h1>
                                    </div>
                                    <ContentRenderer content={activeLesson.content} />
                                    
                                    <div className="mt-24 pt-12 border-t flex justify-end">
                                        <button 
                                            onClick={toggleCompletion}
                                            className={`px-10 py-5 text-xs font-black uppercase tracking-[0.3em] transition-all rounded shadow-md transform active:scale-[0.95] ${completedLessons.includes(activeLesson.id) ? 'bg-green-600 text-white' : 'bg-[#004990] text-white hover:bg-[#F47920]'}`}
                                        >
                                            {completedLessons.includes(activeLesson.id) ? "Lesson Recorded" : "Confirm Completion"}
                                        </button>
                                    </div>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function CourseEditor({ course, onSave, onCancel }) {
            const [data, setData] = useState(() => JSON.parse(JSON.stringify(course)));
            const [editId, setEditId] = useState(() => data?.sections?.[0]?.lessons?.[0]?.id || null);

            const activeLesson = data.sections.flatMap(s => s.lessons).find(l => l.id === editId);

            const updateLesson = (id, field, value) => {
                const newData = {...data};
                newData.sections.forEach(s => {
                    s.lessons = s.lessons.map(l => l.id === id ? {...l, [field]: value} : l);
                });
                setData(newData);
            };

            const addSection = () => {
                const newData = {...data};
                newData.sections.push({ title: "New Group", lessons: [] });
                setData(newData);
            };

            const addLesson = (sectionIndex) => {
                const newData = {...data};
                const newId = `lesson-${Date.now()}`;
                newData.sections[sectionIndex].lessons.push({ id: newId, title: "Untitled Node", content: "# Lesson Content" });
                setData(newData);
                setEditId(newId);
            };

            return (
                <div className="h-[calc(100vh-64px)] flex flex-col bg-slate-100">
                    <div className="bg-white border-b px-10 h-16 flex justify-between items-center relative z-10 shadow-sm">
                        <div className="flex items-center gap-10 flex-1">
                            <span className="text-[10px] font-black text-[#F47920] uppercase tracking-[0.4em] bg-orange-50 px-4 py-1.5 border border-orange-100 rounded-sm">Data Editor</span>
                            <input 
                                className="bg-transparent text-lg font-black text-slate-900 outline-none w-full max-w-2xl border-b-2 border-transparent focus:border-[#004990] transition-all"
                                value={data.title}
                                onChange={e => setData({...data, title: e.target.value})}
                            />
                        </div>
                        <div className="flex gap-6">
                            <button onClick={onCancel} className="px-5 py-2 text-[11px] font-bold uppercase text-slate-400 hover:text-slate-600 tracking-widest transition-colors">Abort</button>
                            <button onClick={() => onSave(data)} className="bg-[#004990] text-white px-8 py-3 text-[11px] font-black uppercase tracking-[0.3em] rounded hover:bg-[#F47920] transition-all shadow-md">Deploy Changes</button>
                        </div>
                    </div>

                    <div className="flex flex-1 overflow-hidden">
                        <div className="w-80 border-r bg-white overflow-y-auto p-8 space-y-12">
                            <div>
                                <h4 className="text-[10px] font-black text-slate-300 uppercase tracking-[0.3em] mb-8 border-b pb-3">Metadata</h4>
                                <div className="space-y-6">
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase block mb-2 tracking-widest">Directory Thumbnail</label>
                                        <input className="w-full bg-slate-50 border border-slate-200 p-4 text-xs outline-none focus:border-[#004990] rounded font-medium" value={data.thumbnail} onChange={e => setData({...data, thumbnail: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase block mb-2 tracking-widest">Technical Tagline</label>
                                        <input className="w-full bg-slate-50 border border-slate-200 p-4 text-xs outline-none focus:border-[#004990] rounded font-medium" value={data.tagline} onChange={e => setData({...data, tagline: e.target.value})} />
                                    </div>
                                </div>
                            </div>

                            <div>
                                <div className="flex justify-between items-center mb-8 border-b pb-3">
                                    <h4 className="text-[10px] font-black text-slate-300 uppercase tracking-[0.3em]">Module Hierarchy</h4>
                                    <button onClick={addSection} className="text-slate-400 hover:text-[#004990]"><Icon name="plus-circle" size={18} /></button>
                                </div>
                                
                                {data.sections.map((sec, sIdx) => (
                                    <div key={sIdx} className="mb-10">
                                        <input className="text-[11px] font-black text-slate-900 uppercase bg-transparent outline-none w-full mb-4 focus:text-[#004990] tracking-widest" value={sec.title} onChange={e => {
                                            const next = {...data}; next.sections[sIdx].title = e.target.value; setData(next);
                                        }} />
                                        <div className="space-y-2 mb-5">
                                            {sec.lessons.map(l => (
                                                <button key={l.id} onClick={() => setEditId(l.id)} className={`w-full text-left px-4 py-3 rounded text-xs font-bold transition-all border ${l.id === editId ? 'bg-slate-50 text-[#004990] border-[#004990] shadow-sm' : 'text-slate-500 border-transparent hover:bg-slate-50'}`}>
                                                    {l.title}
                                                </button>
                                            ))}
                                        </div>
                                        <button onClick={() => addLesson(sIdx)} className="text-[10px] font-black text-slate-400 flex items-center gap-3 hover:text-[#004990] uppercase transition-all px-4 py-2 border border-dashed border-slate-200 rounded w-full justify-center">
                                            <Icon name="plus" size={12} /> New Node
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </div>
                        
                        <div className="flex-1 flex bg-white">
                            {activeLesson ? (
                                <>
                                    <div className="w-1/2 flex flex-col border-r">
                                        <input 
                                            className="px-10 py-8 text-2xl font-black border-b outline-none text-slate-900 uppercase tracking-tight focus:bg-slate-50/30"
                                            value={activeLesson.title}
                                            onChange={e => updateLesson(editId, 'title', e.target.value)}
                                        />
                                        <textarea 
                                            className="flex-1 p-10 outline-none font-mono text-sm leading-relaxed resize-none text-slate-600 bg-slate-50/10 selection:bg-[#004990] selection:text-white"
                                            value={activeLesson.content}
                                            onChange={e => updateLesson(editId, 'content', e.target.value)}
                                            placeholder="# Start writing markdown logic..."
                                        />
                                    </div>
                                    <div className="w-1/2 overflow-y-auto bg-slate-50">
                                        <div className="p-20 max-w-3xl mx-auto bg-white m-12 border shadow-2xl min-h-[90%] rounded-md">
                                            <ContentRenderer content={activeLesson.content} />
                                        </div>
                                    </div>
                                </>
                            ) : (
                                <div className="flex-1 flex flex-col items-center justify-center text-slate-200 uppercase tracking-[1em] text-sm font-black">
                                    Selection Required
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
